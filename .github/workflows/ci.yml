name: CI

on:
  push:
    branches: [main, fix/spa-ssg-test]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate-format:
    name: Verify formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RazorConsole.slnx

      - name: Check formatting
        run: dotnet format RazorConsole.slnx --verify-no-changes

  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RazorConsole.slnx

      - name: Build
        run: dotnet build RazorConsole.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Upload RazorConsole.Core build output
        uses: actions/upload-artifact@v4
        with:
          name: razorconsole-core-release_net10.0
          path: artifacts/bin/RazorConsole.Core/release_net10.0
          if-no-files-found: error

  website-build:
    name: Build website
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download RazorConsole.Core build output
        uses: actions/download-artifact@v4
        with:
          name: razorconsole-core-release_net10.0
          path: artifacts/bin/RazorConsole.Core/release_net10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build website
        run: npm run build
        env:
          VITE_ROUTER_BASENAME: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/spa-ssg-test') && '/RazorConsole/' || '/' }}
          VITE_BASE: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/spa-ssg-test') && '/RazorConsole/' || '/' }}
        working-directory: website

      - name: Create 404 fallback
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/spa-ssg-test')
        run: cp website/build/client/RazorConsole/index.html website/build/client/RazorConsole/404.html

      - name: Configure Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/spa-ssg-test')
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/spa-ssg-test')
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build/client/RazorConsole

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: website-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/spa-ssg-test')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4